<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AutoStream Agent Demo</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <h1>AutoStream Lead Agent</h1>
      <p>Ask about pricing, then express signup intent to trigger lead qualification.</p>
    </header>

    <section id="chat" class="chat" aria-live="polite"></section>

    <form id="chatForm" class="composer">
      <input id="message" type="text" placeholder="Type your message" required>
      <button type="submit">Send</button>
    </form>
  </main>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('chatForm');
    const messageInput = document.getElementById('message');

    function addMessage(role, text) {
      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      bubble.textContent = text;
      chat.appendChild(bubble);
      chat.scrollTop = chat.scrollHeight;
    }

    async function loadHistory() {
      const res = await fetch('/api/history');
      const data = await res.json();
      data.forEach(item => addMessage(item.role, item.text));
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;

      addMessage('user', text);
      messageInput.value = '';

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      if (!res.ok) {
        addMessage('agent', data.error || 'Something went wrong.');
        return;
      }
      addMessage('agent', data.reply);
    });

    loadHistory();
  </script>
</body>
</html>
